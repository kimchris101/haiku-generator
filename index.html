<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css" />
    <title>Haiku Generator</title>
</head>
<body>
    
    <div class="generator-container">
        <header>
            <h1>AI Haiku Generator</h1>
            <p class="subtitle">5-7-5 syllables of artificial wisdom 😘</p>
        </header>
     <main>
            <div class="input-group">
                <label for="topic-input">What should the haiku be about?</label>
                <input 
                    type="text" 
                    id="topic-input" 
                    placeholder="e.g., autumn rain, morning coffee, coding late..."
                    maxlength="50"
                >
                <button id="generate-btn">Generate Haiku</button>
             <p>Open source project by <a href="https://github.com/kimchris101/haiku-generator" target="_blank">kimchris</a></p>
             <p>Hosted on <a href="https://haiku-g.netlify.app/" target="_blank">Netlify</a></p>
    
            </div>

            <!-- The Output Box (Hidden or empty by default, populated via JavaScript) -->
            <div id="haiku-output" class="haiku-card invisible">
                <div class="haiku-poem">
                    <p class="line"></p>
                    <p class="line"></p>
                    <p class="line"></p>

           
                </div>
                <span class="haiku-topic"></span>
            </div>
        </main>
    </div>
    <script src="src/index.js"></script>
</body>
</html>
